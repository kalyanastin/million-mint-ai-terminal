name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install

      - name: Linter Checks
        run: pnpm lint

      - name: Type Verification
        run: pnpm typecheck

      - name: Build Verification
        run: pnpm build
